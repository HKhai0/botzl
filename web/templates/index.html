<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bot Log Receiver</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
        header { background:#333; color:#fff; padding:1rem; text-align:center; }
        main { padding:1rem; }
        .entry { background:#fff; border:1px solid #ccc; margin-bottom:.5rem; padding:.5rem; border-radius:4px; }
        .timestamp { color:#666; font-size:.9rem; }
    </style>
</head>
<body>
<header>
    <h1>Bot Output Receiver</h1>
</header>
<main id="content">
    <p>Loading logs...</p>
</main>
<script>
async function fetchLogs() {
    try {
        const resp = await fetch('/logs');
        const data = await resp.json();
        const container = document.getElementById('content');
        if (!data || data.length === 0) {
            container.innerHTML = '<p>No log entries received yet.</p>';
            return;
        }
        container.innerHTML = '';
        // show newest entries on top
        data.slice().reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'entry';
            div.textContent = JSON.stringify(item, null, 2);
            container.appendChild(div);
        });
    } catch (err) {
        console.error('error fetching logs', err);
    }
}

// poll every 2 seconds
setInterval(fetchLogs, 2000);
// fetch once immediately
fetchLogs();
</script>
</body>
</html>
